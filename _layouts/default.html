<!DOCTYPE html>
<html lang="en">
<head>
{% include gtag.html %}
{% include scrunch.html %}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title | default: site.title }} | Soulcraft</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<meta name="keywords" content="{% if page.keywords %}{{ page.keywords }}, {% endif %}AIQ, agentic marketing, soul.md, brand identity, SEO, AEO, GEO, Soulcraft">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{ site.url }}{{ page.url }}">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="entitymap" type="application/json" href="https://soulcraftagency.com/entitymap.json">

<!-- Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Person",
      "@id": "https://soulcraftagency.com/#evan-drake",
      "name": "Evan Drake",
      "jobTitle": "Founder",
      "description": "Founder of Soulcraft, an AI-native marketing agency. 20 years at the intersection of technology and marketing, from Apple to Chainlink Labs.",
      "url": "https://soulcraftagency.com",
      "sameAs": ["https://www.linkedin.com/in/iamevandrake/", "https://x.com/iamevandrake"]
    },
    {
      "@type": "Organization",
      "@id": "https://soulcraftagency.com/#organization",
      "name": "Soulcraft",
      "description": "AI-native marketing agency building agentic marketing systems driven by identity.",
      "url": "https://soulcraftagency.com",
      "foundingDate": "2026",
      "email": "hello@soulcraftagency.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://soulcraftagency.com/soulcraft-og-image.png"
      },
      "sameAs": ["https://www.linkedin.com/company/112723961/"],
      "founder": { "@id": "https://soulcraftagency.com/#evan-drake" },
      "knowsAbout": ["Answer Engine Optimization", "Generative Engine Optimization", "Agentic Marketing", "SEO", "AI Advertising", "Marketing Automation"]
    },
    {
      "@type": "WebPage",
      "url": "{{ site.url }}{{ page.url }}",
      "name": "{{ page.title | default: site.title }}",
      "description": "{{ page.description | default: site.description }}",
      "isPartOf": { "@id": "https://soulcraftagency.com/#organization" }
    }
  ]
}
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
{{ content }}
</body>
</html>
