<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services — Soulcraft</title>
<meta name="description" content="What we do and where we do it.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/landing.css">
<style>
.category-hero {
  min-height: 60vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 120px 32px 80px;
}

.category-hero h1 {
  font-size: 4rem;
  font-weight: 300;
  margin-bottom: 24px;
  letter-spacing: -1px;
}

.category-hero .subtitle {
  font-size: 1.25rem;
  color: var(--warm-gray);
  font-weight: 300;
  max-width: 500px;
  margin: 0 auto;
}

@media (max-width: 768px) {
  .category-hero {
    padding: 80px 32px 60px;
    min-height: auto;
  }

  .category-hero h1 {
    font-size: 2.5rem;
  }

  .category-hero .subtitle {
    font-size: 1rem;
  }
}
</style>
</head>
<body>

<nav class="sc-nav">
  <a href="/" class="sc-nav-logo">
    <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="20" y="20" width="160" height="160" rx="4" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M100 152 C 100 152, 48 116, 46 84 C 44 62, 58 50, 74 50 C 86 50, 94 58, 100 68 C 106 58, 114 50, 126 50 C 142 50, 156 62, 154 84 C 152 116, 100 152, 100 152Z" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="100" cy="96" r="4.5" fill="#B87A4A"/>
    </svg>
    <span class="sc-nav-wordmark">Soulcraft</span>
  </a>
  <button class="sc-nav-toggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <ul class="sc-nav-links">
    <li><a href="/services/">Services</a></li>
    <li><a href="/industries/">Industries</a></li>
    <li><a href="/solutions/">Solutions</a></li>
    <li><a href="mailto:hello@soulcraftagency.com" class="sc-nav-cta">Get in Touch</a></li>
  </ul>
</nav>

<section class="category-hero">
  <h1>Services</h1>
  <p class="subtitle">What we do and where we do it.</p>
</section>

<!-- ===== LEAD CAPTURE ===== -->
<section class="sc-lead-section" style="max-width:780px;margin:0 auto;padding-left:40px;padding-right:40px">
  <p class="sc-section-label">Let's connect</p>
  <h2>Start a <em>conversation</em></h2>
  <p class="sc-lead-sub">Tell us a bit about yourself and we'll be in touch.</p>

  <form class="sc-lead-form" id="leadForm" novalidate>
    <div class="sc-lead-form-row">
      <div class="sc-lead-form-field">
        <label for="lead-first">First name</label>
        <input type="text" id="lead-first" name="firstName" required autocomplete="given-name">
      </div>
      <div class="sc-lead-form-field">
        <label for="lead-last">Last name</label>
        <input type="text" id="lead-last" name="lastName" required autocomplete="family-name">
      </div>
    </div>
    <div class="sc-lead-form-field">
      <label for="lead-email">Email</label>
      <input type="email" id="lead-email" name="email" required autocomplete="email">
    </div>
    <div class="sc-lead-form-field">
      <label for="lead-company">Company <span class="optional">(optional)</span></label>
      <input type="text" id="lead-company" name="company" autocomplete="organization">
    </div>
    <button type="submit" class="sc-lead-form-submit">Send</button>
    <p class="sc-lead-error" id="leadError"></p>
  </form>

  <div class="sc-lead-success" id="leadSuccess">
    <div class="sc-lead-check">&#10003;</div>
    <p>Thank you. We'll be in touch soon.</p>
  </div>
</section>

<div class="sc-divider" style="margin:0 auto 60px"></div>

<section class="closing">
  <div class="closing-lockup">
    <svg class="heart-mark-small" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="20" y="20" width="160" height="160" rx="4" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M100 152 C 100 152, 48 116, 46 84 C 44 62, 58 50, 74 50 C 86 50, 94 58, 100 68 C 106 58, 114 50, 126 50 C 142 50, 156 62, 154 84 C 152 116, 100 152, 100 152Z" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle class="soul-dot" cx="100" cy="96" r="4.5" fill="#B87A4A"/>
    </svg>
    <svg class="closing-wordmark" viewBox="-4 0 524 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(0, 4)"><path d="M42 18 C36 16, 16 18, 14 32 C12 44, 26 50, 30 52 C36 55, 46 60, 44 72 C42 82, 22 84, 14 76" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></g>
      <g transform="translate(58, 4)"><path d="M28 18 C12 20, 6 38, 8 50 C10 64, 20 80, 32 80 C44 80, 52 64, 52 50 C52 36, 46 18, 30 18 Z" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></g>
      <g transform="translate(122, 4)"><path d="M8 18 L8 56 C8 74, 20 82, 30 82 C40 82, 52 74, 52 56 L52 18" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></g>
      <g transform="translate(186, 4)"><path d="M10 18 L10 78 L46 78" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></g>
      <g transform="translate(242, 4)"><path d="M48 24 C40 16, 20 16, 12 28 C4 40, 4 60, 12 72 C20 82, 40 82, 48 74" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></g>
      <g transform="translate(298, 4)"><path d="M10 78 L10 18 L30 18 C44 18, 48 28, 46 38 C44 48, 36 52, 26 52 L46 78" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></g>
      <g transform="translate(356, 4)"><path d="M2 78 L26 18 L50 78 M12 56 L40 56" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></g>
      <g transform="translate(414, 4)"><path d="M10 18 L44 18 M10 18 L10 78 M10 48 L36 48" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></g>
      <g transform="translate(466, 4)"><path d="M2 18 L50 18 M26 18 L26 78" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></g>
    </svg>
  </div>
  <div class="closing-contact">
    <a href="mailto:hello@soulcraftagency.com">hello@soulcraftagency.com</a>
  </div>
</section>

<script>
// Mobile nav toggle
const navToggle = document.querySelector('.sc-nav-toggle');
const navLinks = document.querySelector('.sc-nav-links');

navToggle.addEventListener('click', () => {
  navLinks.classList.toggle('active');
  navToggle.classList.toggle('active');
});

document.querySelectorAll('.sc-nav-links a').forEach(link => {
  link.addEventListener('click', () => {
    navLinks.classList.remove('active');
    navToggle.classList.remove('active');
  });
});

// Nav scroll effect
window.addEventListener('scroll', () => {
  const nav = document.querySelector('.sc-nav');
  if (window.scrollY > 50) {
    nav.classList.add('scrolled');
  } else {
    nav.classList.remove('scrolled');
  }
});

// Lead form submission
const WEBHOOK_URL = 'https://soulcraft-leads.up.railway.app/api/lead';

document.getElementById('leadForm')?.addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = this.querySelector('.sc-lead-form-submit');
  const error = document.getElementById('leadError');
  const success = document.getElementById('leadSuccess');
  error.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Sending...';

  const data = {
    firstName: this.firstName.value.trim(),
    lastName: this.lastName.value.trim(),
    email: this.email.value.trim(),
    company: this.company.value.trim() || null,
    source: window.location.pathname
  };

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error('Submission failed');
    this.style.display = 'none';
    success.style.display = 'block';
  } catch (err) {
    error.textContent = 'Something went wrong. Please try again or email us directly.';
    error.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Send';
  }
});
</script>

</body>
</html>
